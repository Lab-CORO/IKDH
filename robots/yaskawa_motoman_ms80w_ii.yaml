name: Yaskawa Motoman MS80W II
# Kinematically identical DH to robots/yaskawa_motoman_gp88.yaml
dh:
  a:     [0.32, 0.87, 0.21, 0.0, 0.0, 0.0]
  d:     [0.54, 0.0, 0.0, 1.025, 0.0, 0.175]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, 0]
limits:
  J1: [ -180.0,   180.0]
  J2: [  -90.0,   155.0]
  J3: [ -185.0,   160.0]
  J4: [ -360.0,   360.0]
  J5: [ -125.0,   125.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.87*s1*s2 + 0.175*s1*s5*sin(q2 + q3)*c4 - 0.21*s1*sin(q2 + q3) - 0.175*s1*c5*cos(q2 + q3) - 1.025*s1*cos(q2 + q3) - 0.32*s1 - 0.175*s4*s5*c1", "-0.175*s5*c1*c4*cos(q2 + q3) - 0.175*sin(q2 + q3)*c1*c5 - 1.025*sin(q2 + q3)*c1 + 0.87*c1*c2 + 0.21*c1*cos(q2 + q3)", "-0.175*s5*c1*c4*cos(q2 + q3) - 0.175*sin(q2 + q3)*c1*c5 - 1.025*sin(q2 + q3)*c1 + 0.21*c1*cos(q2 + q3)", "-0.175*s1*s5*c4 + 0.175*s4*s5*sin(q2 + q3)*c1", "-0.175*s1*s4*c5 - 0.175*s5*c1*cos(q2 + q3) - 0.175*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.175*s1*s4*s5 + 0.87*s2*c1 - 0.175*s5*sin(q2 + q3)*c1*c4 + 0.21*sin(q2 + q3)*c1 + 0.175*c1*c5*cos(q2 + q3) + 1.025*c1*cos(q2 + q3) + 0.32*c1", "-0.175*s1*s5*c4*cos(q2 + q3) - 0.175*s1*sin(q2 + q3)*c5 - 1.025*s1*sin(q2 + q3) + 0.87*s1*c2 + 0.21*s1*cos(q2 + q3)", "-0.175*s1*s5*c4*cos(q2 + q3) - 0.175*s1*sin(q2 + q3)*c5 - 1.025*s1*sin(q2 + q3) + 0.21*s1*cos(q2 + q3)", "0.175*s1*s4*s5*sin(q2 + q3) + 0.175*s5*c1*c4", "-0.175*s1*s5*cos(q2 + q3) - 0.175*s1*sin(q2 + q3)*c4*c5 + 0.175*s4*c1*c5", "0"]
    - ["0", "-0.87*s2 + 0.175*s5*sin(q2 + q3)*c4 - 0.21*sin(q2 + q3) - 0.175*c5*cos(q2 + q3) - 1.025*cos(q2 + q3)", "0.175*s5*sin(q2 + q3)*c4 - 0.21*sin(q2 + q3) - 0.175*c5*cos(q2 + q3) - 1.025*cos(q2 + q3)", "0.175*s4*s5*cos(q2 + q3)", "0.175*s5*sin(q2 + q3) - 0.175*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
