name: Mecademic Meca500 R4
# Kinematically identical DH to robots/mecademic_meca500_r3.yaml
dh:
  a:     [0.0, 0.135, 0.038, 0.0, 0.0, 0.0]
  d:     [0.135, 0.0, 0.0, 0.12, 0.0, 0.07]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -175.0,   175.0]
  J2: [  -70.0,    90.0]
  J3: [ -135.0,    70.0]
  J4: [ -170.0,   170.0]
  J5: [ -115.0,   115.0]
  J6: [ -720.0,   720.0]

jacobian:
  rows:
    - ["-0.135*s1*s2 + 0.07*s1*s5*sin(q2 + q3)*c4 - 0.038*s1*sin(q2 + q3) - 0.07*s1*c5*cos(q2 + q3) - 0.12*s1*cos(q2 + q3) - 0.07*s4*s5*c1", "-0.07*s5*c1*c4*cos(q2 + q3) - 0.07*sin(q2 + q3)*c1*c5 - 0.12*sin(q2 + q3)*c1 + 0.135*c1*c2 + 0.038*c1*cos(q2 + q3)", "-0.07*s5*c1*c4*cos(q2 + q3) - 0.07*sin(q2 + q3)*c1*c5 - 0.12*sin(q2 + q3)*c1 + 0.038*c1*cos(q2 + q3)", "-0.07*s1*s5*c4 + 0.07*s4*s5*sin(q2 + q3)*c1", "-0.07*s1*s4*c5 - 0.07*s5*c1*cos(q2 + q3) - 0.07*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.07*s1*s4*s5 + 0.135*s2*c1 - 0.07*s5*sin(q2 + q3)*c1*c4 + 0.038*sin(q2 + q3)*c1 + 0.07*c1*c5*cos(q2 + q3) + 0.12*c1*cos(q2 + q3)", "-0.07*s1*s5*c4*cos(q2 + q3) - 0.07*s1*sin(q2 + q3)*c5 - 0.12*s1*sin(q2 + q3) + 0.135*s1*c2 + 0.038*s1*cos(q2 + q3)", "-0.07*s1*s5*c4*cos(q2 + q3) - 0.07*s1*sin(q2 + q3)*c5 - 0.12*s1*sin(q2 + q3) + 0.038*s1*cos(q2 + q3)", "0.07*s1*s4*s5*sin(q2 + q3) + 0.07*s5*c1*c4", "-0.07*s1*s5*cos(q2 + q3) - 0.07*s1*sin(q2 + q3)*c4*c5 + 0.07*s4*c1*c5", "0"]
    - ["0", "-0.135*s2 + 0.07*s5*sin(q2 + q3)*c4 - 0.038*sin(q2 + q3) - 0.07*c5*cos(q2 + q3) - 0.12*cos(q2 + q3)", "0.07*s5*sin(q2 + q3)*c4 - 0.038*sin(q2 + q3) - 0.07*c5*cos(q2 + q3) - 0.12*cos(q2 + q3)", "0.07*s4*s5*cos(q2 + q3)", "0.07*s5*sin(q2 + q3) - 0.07*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
