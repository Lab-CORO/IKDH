    - ["0", "-s1", "-s1", "-s1", "sin(q2 + q3 + q4)*c1", "-s1*c5 - s5*c1*cos(q2 + q3 + q4)"]
    - ["0", "c1", "c1", "c1", "s1*sin(q2 + q3 + q4)", "-s1*s5*cos(q2 + q3 + q4) + c1*c5"]
    - ["1", "0", "0", "0", "cos(q2 + q3 + q4)", "s5*sin(q2 + q3 + q4)"]
