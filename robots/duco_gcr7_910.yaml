name: DUCO GCR7-910
# Kinematically identical DH to robots/duco_gcr5_910.yaml
dh:
  a:     [0.0, 0.425, 0.392, 0.0, 0.0, 0.0]
  d:     [0.122, 0.0, 0.0, 0.1405, 0.1, 0.105]
  alpha: [pi/2, 0, 0, -pi/2, pi/2, 0]
  theta: [pi, pi/2, 0, -pi/2, 0, 0]
limits:
  J1: [ -360.0,   360.0]
  J2: [ -360.0,   360.0]
  J3: [ -360.0,   360.0]
  J4: [ -360.0,   360.0]
  J5: [ -360.0,   360.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.425*s1*s2 + 0.105*s1*s5*cos(q2 + q3 + q4) - 0.392*s1*sin(q2 + q3) - 0.1*s1*sin(q2 + q3 + q4) - 0.105*c1*c5 - 0.1405*c1", "0.105*s5*sin(q2 + q3 + q4)*c1 + 0.425*c1*c2 + 0.392*c1*cos(q2 + q3) + 0.1*c1*cos(q2 + q3 + q4)", "0.105*s5*sin(q2 + q3 + q4)*c1 + 0.392*c1*cos(q2 + q3) + 0.1*c1*cos(q2 + q3 + q4)", "0.105*s5*sin(q2 + q3 + q4)*c1 + 0.1*c1*cos(q2 + q3 + q4)", "0.105*s1*s5 - 0.105*c1*c5*cos(q2 + q3 + q4)", "0"]
    - ["-0.105*s1*c5 - 0.1405*s1 + 0.425*s2*c1 - 0.105*s5*c1*cos(q2 + q3 + q4) + 0.392*sin(q2 + q3)*c1 + 0.1*sin(q2 + q3 + q4)*c1", "0.105*s1*s5*sin(q2 + q3 + q4) + 0.425*s1*c2 + 0.392*s1*cos(q2 + q3) + 0.1*s1*cos(q2 + q3 + q4)", "0.105*s1*s5*sin(q2 + q3 + q4) + 0.392*s1*cos(q2 + q3) + 0.1*s1*cos(q2 + q3 + q4)", "0.105*s1*s5*sin(q2 + q3 + q4) + 0.1*s1*cos(q2 + q3 + q4)", "-0.105*s1*c5*cos(q2 + q3 + q4) - 0.105*s5*c1", "0"]
