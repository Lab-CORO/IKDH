name: Fanuc M-16iB/20
# Kinematically identical DH to robots/fanuc_arc_mate_120ib.yaml
dh:
  a:     [0.15, 0.77, 0.1, 0.0, 0.0, 0.0]
  d:     [0.525, 0.0, 0.0, 0.74, 0.0, 0.1]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, 0]
limits:
  J1: [ -170.0,   170.0]
  J2: [  -90.0,   160.0]
  J3: [ -170.0,   290.0]
  J4: [ -200.0,   200.0]
  J5: [ -140.0,   140.0]
  J6: [ -450.0,   450.0]

jacobian:
  rows:
    - ["-0.77*s1*s2 + 0.1*s1*s5*sin(q2 + q3)*c4 - 0.1*s1*sin(q2 + q3) - 0.1*s1*c5*cos(q2 + q3) - 0.74*s1*cos(q2 + q3) - 0.15*s1 - 0.1*s4*s5*c1", "-0.1*s5*c1*c4*cos(q2 + q3) - 0.1*sin(q2 + q3)*c1*c5 - 0.74*sin(q2 + q3)*c1 + 0.77*c1*c2 + 0.1*c1*cos(q2 + q3)", "-0.1*s5*c1*c4*cos(q2 + q3) - 0.1*sin(q2 + q3)*c1*c5 - 0.74*sin(q2 + q3)*c1 + 0.1*c1*cos(q2 + q3)", "-0.1*s1*s5*c4 + 0.1*s4*s5*sin(q2 + q3)*c1", "-0.1*s1*s4*c5 - 0.1*s5*c1*cos(q2 + q3) - 0.1*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.1*s1*s4*s5 + 0.77*s2*c1 - 0.1*s5*sin(q2 + q3)*c1*c4 + 0.1*sin(q2 + q3)*c1 + 0.1*c1*c5*cos(q2 + q3) + 0.74*c1*cos(q2 + q3) + 0.15*c1", "-0.1*s1*s5*c4*cos(q2 + q3) - 0.1*s1*sin(q2 + q3)*c5 - 0.74*s1*sin(q2 + q3) + 0.77*s1*c2 + 0.1*s1*cos(q2 + q3)", "-0.1*s1*s5*c4*cos(q2 + q3) - 0.1*s1*sin(q2 + q3)*c5 - 0.74*s1*sin(q2 + q3) + 0.1*s1*cos(q2 + q3)", "0.1*s1*s4*s5*sin(q2 + q3) + 0.1*s5*c1*c4", "-0.1*s1*s5*cos(q2 + q3) - 0.1*s1*sin(q2 + q3)*c4*c5 + 0.1*s4*c1*c5", "0"]
    - ["0", "-0.77*s2 + 0.1*s5*sin(q2 + q3)*c4 - 0.1*sin(q2 + q3) - 0.1*c5*cos(q2 + q3) - 0.74*cos(q2 + q3)", "0.1*s5*sin(q2 + q3)*c4 - 0.1*sin(q2 + q3) - 0.1*c5*cos(q2 + q3) - 0.74*cos(q2 + q3)", "0.1*s4*s5*cos(q2 + q3)", "0.1*s5*sin(q2 + q3) - 0.1*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
