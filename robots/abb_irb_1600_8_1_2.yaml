name: ABB IRB 1600-8/1.2
# Kinematically identical DH to robots/abb_irb_1600_6_1_2.yaml
dh:
  a:     [0.15, 0.475, 0.0, 0.0, 0.0, 0.0]
  d:     [0.4865, 0.0, 0.0, 0.6, 0.0, 0.065]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [  -90.0,   120.0]
  J3: [ -245.0,    65.0]
  J4: [ -200.0,   200.0]
  J5: [ -115.0,   115.0]
  J6: [ -400.0,   400.0]

jacobian:
  rows:
    - ["-0.475*s1*s2 + 0.065*s1*s5*sin(q2 + q3)*c4 - 0.065*s1*c5*cos(q2 + q3) - 0.6*s1*cos(q2 + q3) - 0.15*s1 - 0.065*s4*s5*c1", "-0.065*s5*c1*c4*cos(q2 + q3) - 0.065*sin(q2 + q3)*c1*c5 - 0.6*sin(q2 + q3)*c1 + 0.475*c1*c2", "-0.065*s5*c1*c4*cos(q2 + q3) - 0.065*sin(q2 + q3)*c1*c5 - 0.6*sin(q2 + q3)*c1", "-0.065*s1*s5*c4 + 0.065*s4*s5*sin(q2 + q3)*c1", "-0.065*s1*s4*c5 - 0.065*s5*c1*cos(q2 + q3) - 0.065*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.065*s1*s4*s5 + 0.475*s2*c1 - 0.065*s5*sin(q2 + q3)*c1*c4 + 0.065*c1*c5*cos(q2 + q3) + 0.6*c1*cos(q2 + q3) + 0.15*c1", "-0.065*s1*s5*c4*cos(q2 + q3) - 0.065*s1*sin(q2 + q3)*c5 - 0.6*s1*sin(q2 + q3) + 0.475*s1*c2", "-0.065*s1*s5*c4*cos(q2 + q3) - 0.065*s1*sin(q2 + q3)*c5 - 0.6*s1*sin(q2 + q3)", "0.065*s1*s4*s5*sin(q2 + q3) + 0.065*s5*c1*c4", "-0.065*s1*s5*cos(q2 + q3) - 0.065*s1*sin(q2 + q3)*c4*c5 + 0.065*s4*c1*c5", "0"]
    - ["0", "-0.475*s2 + 0.065*s5*sin(q2 + q3)*c4 - 0.065*c5*cos(q2 + q3) - 0.6*cos(q2 + q3)", "0.065*s5*sin(q2 + q3)*c4 - 0.065*c5*cos(q2 + q3) - 0.6*cos(q2 + q3)", "0.065*s4*s5*cos(q2 + q3)", "0.065*s5*sin(q2 + q3) - 0.065*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
