name: Leantec LA596-4H-R
# Kinematically identical DH to robots/leantec_la596_4_r.yaml
dh:
  a:     [0.04, 0.275, 0.025, 0.0, 0.0, 0.0]
  d:     [0.342, 0.0, 0.0, 0.28, 0.0, 0.075]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -170.0,   170.0]
  J2: [  -80.0,   144.0]
  J3: [ -194.0,    54.0]
  J4: [ -170.0,   170.0]
  J5: [ -119.0,   119.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.275*s1*s2 + 0.075*s1*s5*sin(q2 + q3)*c4 - 0.025*s1*sin(q2 + q3) - 0.075*s1*c5*cos(q2 + q3) - 0.28*s1*cos(q2 + q3) - 0.04*s1 - 0.075*s4*s5*c1", "-0.075*s5*c1*c4*cos(q2 + q3) - 0.075*sin(q2 + q3)*c1*c5 - 0.28*sin(q2 + q3)*c1 + 0.275*c1*c2 + 0.025*c1*cos(q2 + q3)", "-0.075*s5*c1*c4*cos(q2 + q3) - 0.075*sin(q2 + q3)*c1*c5 - 0.28*sin(q2 + q3)*c1 + 0.025*c1*cos(q2 + q3)", "-0.075*s1*s5*c4 + 0.075*s4*s5*sin(q2 + q3)*c1", "-0.075*s1*s4*c5 - 0.075*s5*c1*cos(q2 + q3) - 0.075*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.075*s1*s4*s5 + 0.275*s2*c1 - 0.075*s5*sin(q2 + q3)*c1*c4 + 0.025*sin(q2 + q3)*c1 + 0.075*c1*c5*cos(q2 + q3) + 0.28*c1*cos(q2 + q3) + 0.04*c1", "-0.075*s1*s5*c4*cos(q2 + q3) - 0.075*s1*sin(q2 + q3)*c5 - 0.28*s1*sin(q2 + q3) + 0.275*s1*c2 + 0.025*s1*cos(q2 + q3)", "-0.075*s1*s5*c4*cos(q2 + q3) - 0.075*s1*sin(q2 + q3)*c5 - 0.28*s1*sin(q2 + q3) + 0.025*s1*cos(q2 + q3)", "0.075*s1*s4*s5*sin(q2 + q3) + 0.075*s5*c1*c4", "-0.075*s1*s5*cos(q2 + q3) - 0.075*s1*sin(q2 + q3)*c4*c5 + 0.075*s4*c1*c5", "0"]
    - ["0", "-0.275*s2 + 0.075*s5*sin(q2 + q3)*c4 - 0.025*sin(q2 + q3) - 0.075*c5*cos(q2 + q3) - 0.28*cos(q2 + q3)", "0.075*s5*sin(q2 + q3)*c4 - 0.025*sin(q2 + q3) - 0.075*c5*cos(q2 + q3) - 0.28*cos(q2 + q3)", "0.075*s4*s5*cos(q2 + q3)", "0.075*s5*sin(q2 + q3) - 0.075*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
