name: Mitsubishi RV-50F
# Kinematically identical DH to robots/mitsubishi_rv_35f.yaml
dh:
  a:     [0.15, 0.9, 0.15, 0.0, 0.0, 0.0]
  d:     [0.6, 0.0, 0.0, 0.99, 0.0, 0.175]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -165.0,   165.0]
  J2: [  -80.0,   135.0]
  J3: [  -90.0,   171.0]
  J4: [ -360.0,   360.0]
  J5: [ -125.0,   125.0]
  J6: [ -450.0,   450.0]

jacobian:
  rows:
    - ["-0.9*s1*s2 - 0.175*s1*s5*c4*cos(q2 + q3) - 0.175*s1*sin(q2 + q3)*c5 - 0.99*s1*sin(q2 + q3) + 0.15*s1*cos(q2 + q3) - 0.15*s1 - 0.175*s4*s5*c1", "-0.175*s5*sin(q2 + q3)*c1*c4 + 0.15*sin(q2 + q3)*c1 + 0.9*c1*c2 + 0.175*c1*c5*cos(q2 + q3) + 0.99*c1*cos(q2 + q3)", "-0.175*s5*sin(q2 + q3)*c1*c4 + 0.15*sin(q2 + q3)*c1 + 0.175*c1*c5*cos(q2 + q3) + 0.99*c1*cos(q2 + q3)", "-0.175*s1*s5*c4 - 0.175*s4*s5*c1*cos(q2 + q3)", "-0.175*s1*s4*c5 - 0.175*s5*sin(q2 + q3)*c1 + 0.175*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.175*s1*s4*s5 + 0.9*s2*c1 + 0.175*s5*c1*c4*cos(q2 + q3) + 0.175*sin(q2 + q3)*c1*c5 + 0.99*sin(q2 + q3)*c1 - 0.15*c1*cos(q2 + q3) + 0.15*c1", "-0.175*s1*s5*sin(q2 + q3)*c4 + 0.15*s1*sin(q2 + q3) + 0.9*s1*c2 + 0.175*s1*c5*cos(q2 + q3) + 0.99*s1*cos(q2 + q3)", "-0.175*s1*s5*sin(q2 + q3)*c4 + 0.15*s1*sin(q2 + q3) + 0.175*s1*c5*cos(q2 + q3) + 0.99*s1*cos(q2 + q3)", "-0.175*s1*s4*s5*cos(q2 + q3) + 0.175*s5*c1*c4", "-0.175*s1*s5*sin(q2 + q3) + 0.175*s1*c4*c5*cos(q2 + q3) + 0.175*s4*c1*c5", "0"]
    - ["0", "-0.9*s2 - 0.175*s5*c4*cos(q2 + q3) - 0.175*sin(q2 + q3)*c5 - 0.99*sin(q2 + q3) + 0.15*cos(q2 + q3)", "-0.175*s5*c4*cos(q2 + q3) - 0.175*sin(q2 + q3)*c5 - 0.99*sin(q2 + q3) + 0.15*cos(q2 + q3)", "0.175*s4*s5*sin(q2 + q3)", "-0.175*s5*cos(q2 + q3) - 0.175*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
