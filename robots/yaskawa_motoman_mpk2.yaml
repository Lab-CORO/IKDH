  d:     [0.5, 0.0, 0.0, 0.55, 0.0, 0.07]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, pi/2, 0]
limits:
  J1: [ -170.0,   170.0]
  J2: [  -90.0,   155.0]
  J3: [ -175.0,   190.0]
  J4: [ -150.0,   150.0]
  J5: [  -45.0,   180.0]
  J6: [ -200.0,   200.0]

jacobian:
  rows:
    - ["-0.35*s1*s2 + 0.07*s1*s5*cos(q2 + q3) + 0.07*s1*sin(q2 + q3)*c4*c5 - 0.55*s1*cos(q2 + q3) - 0.07*s4*c1*c5", "0.07*s5*sin(q2 + q3)*c1 - 0.55*sin(q2 + q3)*c1 + 0.35*c1*c2 - 0.07*c1*c4*c5*cos(q2 + q3)", "0.07*s5*sin(q2 + q3)*c1 - 0.55*sin(q2 + q3)*c1 - 0.07*c1*c4*c5*cos(q2 + q3)", "-0.07*s1*c4*c5 + 0.07*s4*sin(q2 + q3)*c1*c5", "0.07*s1*s4*s5 + 0.07*s5*sin(q2 + q3)*c1*c4 - 0.07*c1*c5*cos(q2 + q3)", "0"]
