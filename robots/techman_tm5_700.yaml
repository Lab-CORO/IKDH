name: Techman TM5-700
# Kinematically identical DH to robots/omron_tm5_700.yaml
dh:
  a:     [0.0, 0.329, 0.311, 0.0, 0.0, 0.0]
  d:     [0.1452, 0.0, 0.0, 0.1223, 0.1065, 0.1142]
  alpha: [pi/2, 0, 0, -pi/2, pi/2, 0]
  theta: [0, pi/2, 0, -pi/2, 0, pi]
limits:
  J1: [ -360.0,   360.0]
  J2: [ -180.0,   180.0]
  J3: [ -155.0,   155.0]
  J4: [ -180.0,   180.0]
  J5: [ -180.0,   180.0]
  J6: [ -270.0,   270.0]

jacobian:
  rows:
    - ["0.329*s1*s2 - 0.1142*s1*s5*cos(q2 + q3 + q4) + 0.311*s1*sin(q2 + q3) + 0.1065*s1*sin(q2 + q3 + q4) + 0.1142*c1*c5 + 0.1223*c1", "-0.1142*s5*sin(q2 + q3 + q4)*c1 - 0.329*c1*c2 - 0.311*c1*cos(q2 + q3) - 0.1065*c1*cos(q2 + q3 + q4)", "-0.1142*s5*sin(q2 + q3 + q4)*c1 - 0.311*c1*cos(q2 + q3) - 0.1065*c1*cos(q2 + q3 + q4)", "-0.1142*s5*sin(q2 + q3 + q4)*c1 - 0.1065*c1*cos(q2 + q3 + q4)", "-0.1142*s1*s5 + 0.1142*c1*c5*cos(q2 + q3 + q4)", "0"]
    - ["0.1142*s1*c5 + 0.1223*s1 - 0.329*s2*c1 + 0.1142*s5*c1*cos(q2 + q3 + q4) - 0.311*sin(q2 + q3)*c1 - 0.1065*sin(q2 + q3 + q4)*c1", "-0.1142*s1*s5*sin(q2 + q3 + q4) - 0.329*s1*c2 - 0.311*s1*cos(q2 + q3) - 0.1065*s1*cos(q2 + q3 + q4)", "-0.1142*s1*s5*sin(q2 + q3 + q4) - 0.311*s1*cos(q2 + q3) - 0.1065*s1*cos(q2 + q3 + q4)", "-0.1142*s1*s5*sin(q2 + q3 + q4) - 0.1065*s1*cos(q2 + q3 + q4)", "0.1142*s1*c5*cos(q2 + q3 + q4) + 0.1142*s5*c1", "0"]
    - ["0", "-0.329*s2 + 0.1142*s5*cos(q2 + q3 + q4) - 0.311*sin(q2 + q3) - 0.1065*sin(q2 + q3 + q4)", "0.1142*s5*cos(q2 + q3 + q4) - 0.311*sin(q2 + q3) - 0.1065*sin(q2 + q3 + q4)", "0.1142*s5*cos(q2 + q3 + q4) - 0.1065*sin(q2 + q3 + q4)", "0.1142*sin(q2 + q3 + q4)*c5", "0"]
    - ["0", "s1", "s1", "s1", "-sin(q2 + q3 + q4)*c1", "s1*c5 + s5*c1*cos(q2 + q3 + q4)"]
    - ["0", "-c1", "-c1", "-c1", "-s1*sin(q2 + q3 + q4)", "s1*s5*cos(q2 + q3 + q4) - c1*c5"]
    - ["1", "0", "0", "0", "cos(q2 + q3 + q4)", "s5*sin(q2 + q3 + q4)"]
