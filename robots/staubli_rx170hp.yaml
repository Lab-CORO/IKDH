name: Staubli RX170HP
# Kinematically identical DH to robots/staubli_rx170.yaml
dh:
  a:     [0.1, 0.85, 0.0, 0.0, 0.0, 0.0]
  d:     [0.75, 0.07, 0.0, 0.75, 0.0, 0.135]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [ -120.0,   120.0]
  J3: [ -145.0,   145.0]
  J4: [ -270.0,   270.0]
  J5: [ -110.0,   130.0]
  J6: [ -270.0,   270.0]

jacobian:
  rows:
    - ["-0.85*s1*s2 - 0.135*s1*s5*c4*cos(q2 + q3) - 0.135*s1*sin(q2 + q3)*c5 - 0.75*s1*sin(q2 + q3) - 0.1*s1 - 0.135*s4*s5*c1 - 0.07*c1", "-0.135*s5*sin(q2 + q3)*c1*c4 + 0.85*c1*c2 + 0.135*c1*c5*cos(q2 + q3) + 0.75*c1*cos(q2 + q3)", "-0.135*s5*sin(q2 + q3)*c1*c4 + 0.135*c1*c5*cos(q2 + q3) + 0.75*c1*cos(q2 + q3)", "-0.135*s1*s5*c4 - 0.135*s4*s5*c1*cos(q2 + q3)", "-0.135*s1*s4*c5 - 0.135*s5*sin(q2 + q3)*c1 + 0.135*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.135*s1*s4*s5 - 0.07*s1 + 0.85*s2*c1 + 0.135*s5*c1*c4*cos(q2 + q3) + 0.135*sin(q2 + q3)*c1*c5 + 0.75*sin(q2 + q3)*c1 + 0.1*c1", "-0.135*s1*s5*sin(q2 + q3)*c4 + 0.85*s1*c2 + 0.135*s1*c5*cos(q2 + q3) + 0.75*s1*cos(q2 + q3)", "-0.135*s1*s5*sin(q2 + q3)*c4 + 0.135*s1*c5*cos(q2 + q3) + 0.75*s1*cos(q2 + q3)", "-0.135*s1*s4*s5*cos(q2 + q3) + 0.135*s5*c1*c4", "-0.135*s1*s5*sin(q2 + q3) + 0.135*s1*c4*c5*cos(q2 + q3) + 0.135*s4*c1*c5", "0"]
    - ["0", "-0.85*s2 - 0.135*s5*c4*cos(q2 + q3) - 0.135*sin(q2 + q3)*c5 - 0.75*sin(q2 + q3)", "-0.135*s5*c4*cos(q2 + q3) - 0.135*sin(q2 + q3)*c5 - 0.75*sin(q2 + q3)", "0.135*s4*s5*sin(q2 + q3)", "-0.135*s5*cos(q2 + q3) - 0.135*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
