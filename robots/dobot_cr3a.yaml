name: Dobot CR3A
# Kinematically identical DH to robots/dobot_cr3.yaml
dh:
  a:     [0.0, 0.274, 0.23, 0.0, 0.0, 0.0]
  d:     [0.1348, 0.0, 0.0, 0.1283, 0.116, 0.105]
  alpha: [pi/2, 0, 0, -pi/2, pi/2, 0]
  theta: [0, pi/2, 0, -pi/2, 0, 0]
limits:
  J1: [ -360.0,   360.0]
  J2: [ -360.0,   360.0]
  J3: [ -155.0,   155.0]
  J4: [ -360.0,   360.0]
  J5: [ -360.0,   360.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["0.274*s1*s2 - 0.105*s1*s5*cos(q2 + q3 + q4) + 0.23*s1*sin(q2 + q3) + 0.116*s1*sin(q2 + q3 + q4) + 0.105*c1*c5 + 0.1283*c1", "-0.105*s5*sin(q2 + q3 + q4)*c1 - 0.274*c1*c2 - 0.23*c1*cos(q2 + q3) - 0.116*c1*cos(q2 + q3 + q4)", "-0.105*s5*sin(q2 + q3 + q4)*c1 - 0.23*c1*cos(q2 + q3) - 0.116*c1*cos(q2 + q3 + q4)", "-0.105*s5*sin(q2 + q3 + q4)*c1 - 0.116*c1*cos(q2 + q3 + q4)", "-0.105*s1*s5 + 0.105*c1*c5*cos(q2 + q3 + q4)", "0"]
    - ["0.105*s1*c5 + 0.1283*s1 - 0.274*s2*c1 + 0.105*s5*c1*cos(q2 + q3 + q4) - 0.23*sin(q2 + q3)*c1 - 0.116*sin(q2 + q3 + q4)*c1", "-0.105*s1*s5*sin(q2 + q3 + q4) - 0.274*s1*c2 - 0.23*s1*cos(q2 + q3) - 0.116*s1*cos(q2 + q3 + q4)", "-0.105*s1*s5*sin(q2 + q3 + q4) - 0.23*s1*cos(q2 + q3) - 0.116*s1*cos(q2 + q3 + q4)", "-0.105*s1*s5*sin(q2 + q3 + q4) - 0.116*s1*cos(q2 + q3 + q4)", "0.105*s1*c5*cos(q2 + q3 + q4) + 0.105*s5*c1", "0"]
    - ["0", "-0.274*s2 + 0.105*s5*cos(q2 + q3 + q4) - 0.23*sin(q2 + q3) - 0.116*sin(q2 + q3 + q4)", "0.105*s5*cos(q2 + q3 + q4) - 0.23*sin(q2 + q3) - 0.116*sin(q2 + q3 + q4)", "0.105*s5*cos(q2 + q3 + q4) - 0.116*sin(q2 + q3 + q4)", "0.105*sin(q2 + q3 + q4)*c5", "0"]
    - ["0", "s1", "s1", "s1", "-sin(q2 + q3 + q4)*c1", "s1*c5 + s5*c1*cos(q2 + q3 + q4)"]
    - ["0", "-c1", "-c1", "-c1", "-s1*sin(q2 + q3 + q4)", "s1*s5*cos(q2 + q3 + q4) - c1*c5"]
    - ["1", "0", "0", "0", "cos(q2 + q3 + q4)", "s5*sin(q2 + q3 + q4)"]
