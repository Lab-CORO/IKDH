name: Kawasaki RS80N
# Kinematically identical DH to robots/kawasaki_rs50n.yaml
dh:
  a:     [0.15, 0.87, 0.0, 0.0, 0.0, 0.0]
  d:     [0.68, 0.015, 0.0, 1.08, 0.0, 0.165]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [ -105.0,   140.0]
  J3: [ -155.0,   135.0]
  J4: [ -360.0,   360.0]
  J5: [ -145.0,   145.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.87*s1*s2 - 0.165*s1*s5*c4*cos(q2 + q3) - 0.165*s1*sin(q2 + q3)*c5 - 1.08*s1*sin(q2 + q3) - 0.15*s1 - 0.165*s4*s5*c1 - 0.015*c1", "-0.165*s5*sin(q2 + q3)*c1*c4 + 0.87*c1*c2 + 0.165*c1*c5*cos(q2 + q3) + 1.08*c1*cos(q2 + q3)", "-0.165*s5*sin(q2 + q3)*c1*c4 + 0.165*c1*c5*cos(q2 + q3) + 1.08*c1*cos(q2 + q3)", "-0.165*s1*s5*c4 - 0.165*s4*s5*c1*cos(q2 + q3)", "-0.165*s1*s4*c5 - 0.165*s5*sin(q2 + q3)*c1 + 0.165*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.165*s1*s4*s5 - 0.015*s1 + 0.87*s2*c1 + 0.165*s5*c1*c4*cos(q2 + q3) + 0.165*sin(q2 + q3)*c1*c5 + 1.08*sin(q2 + q3)*c1 + 0.15*c1", "-0.165*s1*s5*sin(q2 + q3)*c4 + 0.87*s1*c2 + 0.165*s1*c5*cos(q2 + q3) + 1.08*s1*cos(q2 + q3)", "-0.165*s1*s5*sin(q2 + q3)*c4 + 0.165*s1*c5*cos(q2 + q3) + 1.08*s1*cos(q2 + q3)", "-0.165*s1*s4*s5*cos(q2 + q3) + 0.165*s5*c1*c4", "-0.165*s1*s5*sin(q2 + q3) + 0.165*s1*c4*c5*cos(q2 + q3) + 0.165*s4*c1*c5", "0"]
    - ["0", "-0.87*s2 - 0.165*s5*c4*cos(q2 + q3) - 0.165*sin(q2 + q3)*c5 - 1.08*sin(q2 + q3)", "-0.165*s5*c4*cos(q2 + q3) - 0.165*sin(q2 + q3)*c5 - 1.08*sin(q2 + q3)", "0.165*s4*s5*sin(q2 + q3)", "-0.165*s5*cos(q2 + q3) - 0.165*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
