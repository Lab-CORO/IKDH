name: Nachi SRA210H
# Kinematically identical DH to robots/nachi_sra100h.yaml
dh:
  a:     [0.305, 1.19, 0.2, 0.0, 0.0, 0.0]
  d:     [0.64, 0.0, 0.0, 1.16, 0.0, 0.37]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [  -80.0,    60.0]
  J3: [ -146.5,   150.0]
  J4: [ -210.0,   210.0]
  J5: [ -125.0,   125.0]
  J6: [ -210.0,   210.0]

jacobian:
  rows:
    - ["-1.19*s1*s2 + 0.37*s1*s5*sin(q2 + q3)*c4 - 0.2*s1*sin(q2 + q3) - 0.37*s1*c5*cos(q2 + q3) - 1.16*s1*cos(q2 + q3) - 0.305*s1 - 0.37*s4*s5*c1", "-0.37*s5*c1*c4*cos(q2 + q3) - 0.37*sin(q2 + q3)*c1*c5 - 1.16*sin(q2 + q3)*c1 + 1.19*c1*c2 + 0.2*c1*cos(q2 + q3)", "-0.37*s5*c1*c4*cos(q2 + q3) - 0.37*sin(q2 + q3)*c1*c5 - 1.16*sin(q2 + q3)*c1 + 0.2*c1*cos(q2 + q3)", "-0.37*s1*s5*c4 + 0.37*s4*s5*sin(q2 + q3)*c1", "-0.37*s1*s4*c5 - 0.37*s5*c1*cos(q2 + q3) - 0.37*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.37*s1*s4*s5 + 1.19*s2*c1 - 0.37*s5*sin(q2 + q3)*c1*c4 + 0.2*sin(q2 + q3)*c1 + 0.37*c1*c5*cos(q2 + q3) + 1.16*c1*cos(q2 + q3) + 0.305*c1", "-0.37*s1*s5*c4*cos(q2 + q3) - 0.37*s1*sin(q2 + q3)*c5 - 1.16*s1*sin(q2 + q3) + 1.19*s1*c2 + 0.2*s1*cos(q2 + q3)", "-0.37*s1*s5*c4*cos(q2 + q3) - 0.37*s1*sin(q2 + q3)*c5 - 1.16*s1*sin(q2 + q3) + 0.2*s1*cos(q2 + q3)", "0.37*s1*s4*s5*sin(q2 + q3) + 0.37*s5*c1*c4", "-0.37*s1*s5*cos(q2 + q3) - 0.37*s1*sin(q2 + q3)*c4*c5 + 0.37*s4*c1*c5", "0"]
    - ["0", "-1.19*s2 + 0.37*s5*sin(q2 + q3)*c4 - 0.2*sin(q2 + q3) - 0.37*c5*cos(q2 + q3) - 1.16*cos(q2 + q3)", "0.37*s5*sin(q2 + q3)*c4 - 0.2*sin(q2 + q3) - 0.37*c5*cos(q2 + q3) - 1.16*cos(q2 + q3)", "0.37*s4*s5*cos(q2 + q3)", "0.37*s5*sin(q2 + q3) - 0.37*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
