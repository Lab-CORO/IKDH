name: ABB IRB 2400/16
# Kinematically identical DH to robots/abb_irb_2400_10.yaml
dh:
  a:     [0.1, 0.705, 0.135, 0.0, 0.0, 0.0]
  d:     [0.615, 0.0, 0.0, 0.755, 0.0, 0.085]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [ -100.0,   110.0]
  J3: [  -60.0,    65.0]
  J4: [ -200.0,   200.0]
  J5: [ -120.0,   120.0]
  J6: [ -400.0,   400.0]

jacobian:
  rows:
    - ["-0.705*s1*s2 + 0.085*s1*s5*sin(q2 + q3)*c4 - 0.135*s1*sin(q2 + q3) - 0.085*s1*c5*cos(q2 + q3) - 0.755*s1*cos(q2 + q3) - 0.1*s1 - 0.085*s4*s5*c1", "-0.085*s5*c1*c4*cos(q2 + q3) - 0.085*sin(q2 + q3)*c1*c5 - 0.755*sin(q2 + q3)*c1 + 0.705*c1*c2 + 0.135*c1*cos(q2 + q3)", "-0.085*s5*c1*c4*cos(q2 + q3) - 0.085*sin(q2 + q3)*c1*c5 - 0.755*sin(q2 + q3)*c1 + 0.135*c1*cos(q2 + q3)", "-0.085*s1*s5*c4 + 0.085*s4*s5*sin(q2 + q3)*c1", "-0.085*s1*s4*c5 - 0.085*s5*c1*cos(q2 + q3) - 0.085*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.085*s1*s4*s5 + 0.705*s2*c1 - 0.085*s5*sin(q2 + q3)*c1*c4 + 0.135*sin(q2 + q3)*c1 + 0.085*c1*c5*cos(q2 + q3) + 0.755*c1*cos(q2 + q3) + 0.1*c1", "-0.085*s1*s5*c4*cos(q2 + q3) - 0.085*s1*sin(q2 + q3)*c5 - 0.755*s1*sin(q2 + q3) + 0.705*s1*c2 + 0.135*s1*cos(q2 + q3)", "-0.085*s1*s5*c4*cos(q2 + q3) - 0.085*s1*sin(q2 + q3)*c5 - 0.755*s1*sin(q2 + q3) + 0.135*s1*cos(q2 + q3)", "0.085*s1*s4*s5*sin(q2 + q3) + 0.085*s5*c1*c4", "-0.085*s1*s5*cos(q2 + q3) - 0.085*s1*sin(q2 + q3)*c4*c5 + 0.085*s4*c1*c5", "0"]
    - ["0", "-0.705*s2 + 0.085*s5*sin(q2 + q3)*c4 - 0.135*sin(q2 + q3) - 0.085*c5*cos(q2 + q3) - 0.755*cos(q2 + q3)", "0.085*s5*sin(q2 + q3)*c4 - 0.135*sin(q2 + q3) - 0.085*c5*cos(q2 + q3) - 0.755*cos(q2 + q3)", "0.085*s4*s5*cos(q2 + q3)", "0.085*s5*sin(q2 + q3) - 0.085*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
