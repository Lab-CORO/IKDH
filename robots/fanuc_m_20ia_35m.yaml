name: Fanuc M-20iA/35M
# Kinematically identical DH to robots/fanuc_m_20ia_20m.yaml
dh:
  a:     [0.15, 0.79, 0.15, 0.0, 0.0, 0.0]
  d:     [0.525, 0.0, 0.0, 0.86, 0.0, 0.1]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, 0]
limits:
  J1: [ -185.0,   185.0]
  J2: [ -110.0,   110.0]
  J3: [  -85.0,   245.0]
  J4: [ -200.0,   200.0]
  J5: [ -190.0,   190.0]
  J6: [ -450.0,   450.0]

jacobian:
  rows:
    - ["-0.79*s1*s2 + 0.1*s1*s5*sin(q2 + q3)*c4 - 0.15*s1*sin(q2 + q3) - 0.1*s1*c5*cos(q2 + q3) - 0.86*s1*cos(q2 + q3) - 0.15*s1 - 0.1*s4*s5*c1", "-0.1*s5*c1*c4*cos(q2 + q3) - 0.1*sin(q2 + q3)*c1*c5 - 0.86*sin(q2 + q3)*c1 + 0.79*c1*c2 + 0.15*c1*cos(q2 + q3)", "-0.1*s5*c1*c4*cos(q2 + q3) - 0.1*sin(q2 + q3)*c1*c5 - 0.86*sin(q2 + q3)*c1 + 0.15*c1*cos(q2 + q3)", "-0.1*s1*s5*c4 + 0.1*s4*s5*sin(q2 + q3)*c1", "-0.1*s1*s4*c5 - 0.1*s5*c1*cos(q2 + q3) - 0.1*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.1*s1*s4*s5 + 0.79*s2*c1 - 0.1*s5*sin(q2 + q3)*c1*c4 + 0.15*sin(q2 + q3)*c1 + 0.1*c1*c5*cos(q2 + q3) + 0.86*c1*cos(q2 + q3) + 0.15*c1", "-0.1*s1*s5*c4*cos(q2 + q3) - 0.1*s1*sin(q2 + q3)*c5 - 0.86*s1*sin(q2 + q3) + 0.79*s1*c2 + 0.15*s1*cos(q2 + q3)", "-0.1*s1*s5*c4*cos(q2 + q3) - 0.1*s1*sin(q2 + q3)*c5 - 0.86*s1*sin(q2 + q3) + 0.15*s1*cos(q2 + q3)", "0.1*s1*s4*s5*sin(q2 + q3) + 0.1*s5*c1*c4", "-0.1*s1*s5*cos(q2 + q3) - 0.1*s1*sin(q2 + q3)*c4*c5 + 0.1*s4*c1*c5", "0"]
    - ["0", "-0.79*s2 + 0.1*s5*sin(q2 + q3)*c4 - 0.15*sin(q2 + q3) - 0.1*c5*cos(q2 + q3) - 0.86*cos(q2 + q3)", "0.1*s5*sin(q2 + q3)*c4 - 0.15*sin(q2 + q3) - 0.1*c5*cos(q2 + q3) - 0.86*cos(q2 + q3)", "0.1*s4*s5*cos(q2 + q3)", "0.1*s5*sin(q2 + q3) - 0.1*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
