name: Techman TM25S
# Kinematically identical DH to robots/omron_tm25s.yaml
dh:
  a:     [0.0, 0.95, 0.0, 0.0, 0.0, 0.0]
  d:     [0.235, -0.07, 0.0, 0.8, 0.1702, 0.1529]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -360.0,   360.0]
  J2: [ -360.0,   360.0]
  J3: [ -163.0,   163.0]
  J4: [ -360.0,   360.0]
  J5: [ -360.0,   360.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.95*s1*s2 + 0.1702*s1*s4*cos(q2 + q3) - 0.1529*s1*s5*c4*cos(q2 + q3) - 0.1529*s1*sin(q2 + q3)*c5 - 0.8*s1*sin(q2 + q3) - 0.1529*s4*s5*c1 - 0.1702*c1*c4 + 0.07*c1", "0.1702*s4*sin(q2 + q3)*c1 - 0.1529*s5*sin(q2 + q3)*c1*c4 + 0.95*c1*c2 + 0.1529*c1*c5*cos(q2 + q3) + 0.8*c1*cos(q2 + q3)", "0.1702*s4*sin(q2 + q3)*c1 - 0.1529*s5*sin(q2 + q3)*c1*c4 + 0.1529*c1*c5*cos(q2 + q3) + 0.8*c1*cos(q2 + q3)", "0.1702*s1*s4 - 0.1529*s1*s5*c4 - 0.1529*s4*s5*c1*cos(q2 + q3) - 0.1702*c1*c4*cos(q2 + q3)", "-0.1529*s1*s4*c5 - 0.1529*s5*sin(q2 + q3)*c1 + 0.1529*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.1529*s1*s4*s5 - 0.1702*s1*c4 + 0.07*s1 + 0.95*s2*c1 - 0.1702*s4*c1*cos(q2 + q3) + 0.1529*s5*c1*c4*cos(q2 + q3) + 0.1529*sin(q2 + q3)*c1*c5 + 0.8*sin(q2 + q3)*c1", "0.1702*s1*s4*sin(q2 + q3) - 0.1529*s1*s5*sin(q2 + q3)*c4 + 0.95*s1*c2 + 0.1529*s1*c5*cos(q2 + q3) + 0.8*s1*cos(q2 + q3)", "0.1702*s1*s4*sin(q2 + q3) - 0.1529*s1*s5*sin(q2 + q3)*c4 + 0.1529*s1*c5*cos(q2 + q3) + 0.8*s1*cos(q2 + q3)", "-0.1529*s1*s4*s5*cos(q2 + q3) - 0.1702*s1*c4*cos(q2 + q3) - 0.1702*s4*c1 + 0.1529*s5*c1*c4", "-0.1529*s1*s5*sin(q2 + q3) + 0.1529*s1*c4*c5*cos(q2 + q3) + 0.1529*s4*c1*c5", "0"]
    - ["0", "-0.95*s2 + 0.1702*s4*cos(q2 + q3) - 0.1529*s5*c4*cos(q2 + q3) - 0.1529*sin(q2 + q3)*c5 - 0.8*sin(q2 + q3)", "0.1702*s4*cos(q2 + q3) - 0.1529*s5*c4*cos(q2 + q3) - 0.1529*sin(q2 + q3)*c5 - 0.8*sin(q2 + q3)", "0.1529*s4*s5*sin(q2 + q3) + 0.1702*sin(q2 + q3)*c4", "-0.1529*s5*cos(q2 + q3) - 0.1529*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
