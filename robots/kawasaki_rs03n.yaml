name: Kawasaki RS03N
# Kinematically identical DH to robots/kawasaki_fs03n.yaml
dh:
  a:     [0.12, 0.25, 0.0, 0.0, 0.0, 0.0]
  d:     [0.25, 0.0, 0.0, 0.25, 0.0, 0.08]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -160.0,   160.0]
  J2: [  -60.0,   150.0]
  J3: [ -150.0,   120.0]
  J4: [ -360.0,   360.0]
  J5: [ -135.0,   135.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.25*s1*s2 - 0.08*s1*s5*c4*cos(q2 + q3) - 0.08*s1*sin(q2 + q3)*c5 - 0.25*s1*sin(q2 + q3) - 0.12*s1 - 0.08*s4*s5*c1", "-0.08*s5*sin(q2 + q3)*c1*c4 + 0.25*c1*c2 + 0.08*c1*c5*cos(q2 + q3) + 0.25*c1*cos(q2 + q3)", "-0.08*s5*sin(q2 + q3)*c1*c4 + 0.08*c1*c5*cos(q2 + q3) + 0.25*c1*cos(q2 + q3)", "-0.08*s1*s5*c4 - 0.08*s4*s5*c1*cos(q2 + q3)", "-0.08*s1*s4*c5 - 0.08*s5*sin(q2 + q3)*c1 + 0.08*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.08*s1*s4*s5 + 0.25*s2*c1 + 0.08*s5*c1*c4*cos(q2 + q3) + 0.08*sin(q2 + q3)*c1*c5 + 0.25*sin(q2 + q3)*c1 + 0.12*c1", "-0.08*s1*s5*sin(q2 + q3)*c4 + 0.25*s1*c2 + 0.08*s1*c5*cos(q2 + q3) + 0.25*s1*cos(q2 + q3)", "-0.08*s1*s5*sin(q2 + q3)*c4 + 0.08*s1*c5*cos(q2 + q3) + 0.25*s1*cos(q2 + q3)", "-0.08*s1*s4*s5*cos(q2 + q3) + 0.08*s5*c1*c4", "-0.08*s1*s5*sin(q2 + q3) + 0.08*s1*c4*c5*cos(q2 + q3) + 0.08*s4*c1*c5", "0"]
    - ["0", "-0.25*s2 - 0.08*s5*c4*cos(q2 + q3) - 0.08*sin(q2 + q3)*c5 - 0.25*sin(q2 + q3)", "-0.08*s5*c4*cos(q2 + q3) - 0.08*sin(q2 + q3)*c5 - 0.25*sin(q2 + q3)", "0.08*s4*s5*sin(q2 + q3)", "-0.08*s5*cos(q2 + q3) - 0.08*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
