    - ["-0.41*s1*s2 - 0.1674*s1*s5*c4*cos(q2 + q3) - 0.1674*s1*sin(q2 + q3)*c5 - 0.3143*s1*sin(q2 + q3) - 0.1674*s4*s5*c1 - 0.001*c1", "-0.1674*s5*sin(q2 + q3)*c1*c4 + 0.41*c1*c2 + 0.1674*c1*c5*cos(q2 + q3) + 0.3143*c1*cos(q2 + q3)", "-0.1674*s5*sin(q2 + q3)*c1*c4 + 0.1674*c1*c5*cos(q2 + q3) + 0.3143*c1*cos(q2 + q3)", "-0.1674*s1*s5*c4 - 0.1674*s4*s5*c1*cos(q2 + q3)", "-0.1674*s1*s4*c5 - 0.1674*s5*sin(q2 + q3)*c1 + 0.1674*c1*c4*c5*cos(q2 + q3)", "0"]
