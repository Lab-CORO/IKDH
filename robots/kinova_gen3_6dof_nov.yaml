  d:     [0.2848, 0.001, 0.0, 0.3143, 0.0, 0.1674]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, 0]
limits:
  J1: [ -360.0,   360.0]
  J2: [ -128.9,   128.9]
  J3: [ -147.8,   147.8]
  J4: [ -360.0,   360.0]
  J5: [ -120.3,   120.3]
  J6: [ -360.0,   360.0]

jacobian:
