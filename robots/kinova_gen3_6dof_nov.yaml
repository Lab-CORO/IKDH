    - ["0", "-0.41*s2 - 0.1674*s5*c4*cos(q2 + q3) - 0.1674*sin(q2 + q3)*c5 - 0.3143*sin(q2 + q3)", "-0.1674*s5*c4*cos(q2 + q3) - 0.1674*sin(q2 + q3)*c5 - 0.3143*sin(q2 + q3)", "0.1674*s4*s5*sin(q2 + q3)", "-0.1674*s5*cos(q2 + q3) - 0.1674*sin(q2 + q3)*c4*c5", "0"]
