  d:     [0.1452, 0.0, 0.0, 0.1223, 0.1065, 0.1141]
  alpha: [pi/2, 0, 0, -pi/2, pi/2, 0]
  theta: [0, pi/2, 0, -pi/2, 0, pi]
limits:
  J1: [ -360.0,   360.0]
  J2: [ -360.0,   360.0]
  J3: [ -155.0,   155.0]
  J4: [ -360.0,   360.0]
  J5: [ -360.0,   360.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["0.429*s1*s2 - 0.1141*s1*s5*cos(q2 + q3 + q4) + 0.411*s1*sin(q2 + q3) + 0.1065*s1*sin(q2 + q3 + q4) + 0.1141*c1*c5 + 0.1223*c1", "-0.1141*s5*sin(q2 + q3 + q4)*c1 - 0.429*c1*c2 - 0.411*c1*cos(q2 + q3) - 0.1065*c1*cos(q2 + q3 + q4)", "-0.1141*s5*sin(q2 + q3 + q4)*c1 - 0.411*c1*cos(q2 + q3) - 0.1065*c1*cos(q2 + q3 + q4)", "-0.1141*s5*sin(q2 + q3 + q4)*c1 - 0.1065*c1*cos(q2 + q3 + q4)", "-0.1141*s1*s5 + 0.1141*c1*c5*cos(q2 + q3 + q4)", "0"]
