    - ["0", "-0.44*s2 + 0.0821*s5*sin(q2 + q3)*c4 - 0.035*sin(q2 + q3) - 0.0821*c5*cos(q2 + q3) - 0.4335*cos(q2 + q3)", "0.0821*s5*sin(q2 + q3)*c4 - 0.035*sin(q2 + q3) - 0.0821*c5*cos(q2 + q3) - 0.4335*cos(q2 + q3)", "0.0821*s4*s5*cos(q2 + q3)", "0.0821*s5*sin(q2 + q3) - 0.0821*c4*c5*cos(q2 + q3)", "0"]
