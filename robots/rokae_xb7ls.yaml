  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -165.0,   165.0]
  J2: [  -90.0,   130.0]
  J3: [ -205.0,    61.0]
  J4: [ -165.0,   165.0]
  J5: [ -130.0,   130.0]
  J6: [ -355.0,   355.0]

