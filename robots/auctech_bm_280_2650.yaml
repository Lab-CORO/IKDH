name: AUCTECH BM-280-2650
# Kinematically identical DH to robots/auctech_bm_210_2650.yaml
dh:
  a:     [0.2, 1.16, 0.23, 0.0, 0.0, 0.0]
  d:     [0.6, 0.0, 0.0, 1.281, 0.0, 0.245]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [  -60.0,    60.0]
  J3: [  -80.0,    95.0]
  J4: [ -210.0,   210.0]
  J5: [ -125.0,   125.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-1.16*s1*s2 + 0.245*s1*s5*sin(q2 + q3)*c4 - 0.23*s1*sin(q2 + q3) - 0.245*s1*c5*cos(q2 + q3) - 1.281*s1*cos(q2 + q3) - 0.2*s1 - 0.245*s4*s5*c1", "-0.245*s5*c1*c4*cos(q2 + q3) - 0.245*sin(q2 + q3)*c1*c5 - 1.281*sin(q2 + q3)*c1 + 1.16*c1*c2 + 0.23*c1*cos(q2 + q3)", "-0.245*s5*c1*c4*cos(q2 + q3) - 0.245*sin(q2 + q3)*c1*c5 - 1.281*sin(q2 + q3)*c1 + 0.23*c1*cos(q2 + q3)", "-0.245*s1*s5*c4 + 0.245*s4*s5*sin(q2 + q3)*c1", "-0.245*s1*s4*c5 - 0.245*s5*c1*cos(q2 + q3) - 0.245*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.245*s1*s4*s5 + 1.16*s2*c1 - 0.245*s5*sin(q2 + q3)*c1*c4 + 0.23*sin(q2 + q3)*c1 + 0.245*c1*c5*cos(q2 + q3) + 1.281*c1*cos(q2 + q3) + 0.2*c1", "-0.245*s1*s5*c4*cos(q2 + q3) - 0.245*s1*sin(q2 + q3)*c5 - 1.281*s1*sin(q2 + q3) + 1.16*s1*c2 + 0.23*s1*cos(q2 + q3)", "-0.245*s1*s5*c4*cos(q2 + q3) - 0.245*s1*sin(q2 + q3)*c5 - 1.281*s1*sin(q2 + q3) + 0.23*s1*cos(q2 + q3)", "0.245*s1*s4*s5*sin(q2 + q3) + 0.245*s5*c1*c4", "-0.245*s1*s5*cos(q2 + q3) - 0.245*s1*sin(q2 + q3)*c4*c5 + 0.245*s4*c1*c5", "0"]
    - ["0", "-1.16*s2 + 0.245*s5*sin(q2 + q3)*c4 - 0.23*sin(q2 + q3) - 0.245*c5*cos(q2 + q3) - 1.281*cos(q2 + q3)", "0.245*s5*sin(q2 + q3)*c4 - 0.23*sin(q2 + q3) - 0.245*c5*cos(q2 + q3) - 1.281*cos(q2 + q3)", "0.245*s4*s5*cos(q2 + q3)", "0.245*s5*sin(q2 + q3) - 0.245*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
