name: Staubli TX60L
# Kinematically identical DH to robots/staubli_tx2_60l.yaml
dh:
  a:     [0.0, 0.4, 0.0, 0.0, 0.0, 0.0]
  d:     [0.375, 0.02, 0.0, 0.45, 0.0, 0.07]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [ -127.5,   127.5]
  J3: [ -142.5,   142.5]
  J4: [ -270.0,   270.0]
  J5: [ -122.5,   133.5]
  J6: [ -270.0,   270.0]

jacobian:
  rows:
    - ["-0.4*s1*s2 - 0.07*s1*s5*c4*cos(q2 + q3) - 0.07*s1*sin(q2 + q3)*c5 - 0.45*s1*sin(q2 + q3) - 0.07*s4*s5*c1 - 0.02*c1", "-0.07*s5*sin(q2 + q3)*c1*c4 + 0.4*c1*c2 + 0.07*c1*c5*cos(q2 + q3) + 0.45*c1*cos(q2 + q3)", "-0.07*s5*sin(q2 + q3)*c1*c4 + 0.07*c1*c5*cos(q2 + q3) + 0.45*c1*cos(q2 + q3)", "-0.07*s1*s5*c4 - 0.07*s4*s5*c1*cos(q2 + q3)", "-0.07*s1*s4*c5 - 0.07*s5*sin(q2 + q3)*c1 + 0.07*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.07*s1*s4*s5 - 0.02*s1 + 0.4*s2*c1 + 0.07*s5*c1*c4*cos(q2 + q3) + 0.07*sin(q2 + q3)*c1*c5 + 0.45*sin(q2 + q3)*c1", "-0.07*s1*s5*sin(q2 + q3)*c4 + 0.4*s1*c2 + 0.07*s1*c5*cos(q2 + q3) + 0.45*s1*cos(q2 + q3)", "-0.07*s1*s5*sin(q2 + q3)*c4 + 0.07*s1*c5*cos(q2 + q3) + 0.45*s1*cos(q2 + q3)", "-0.07*s1*s4*s5*cos(q2 + q3) + 0.07*s5*c1*c4", "-0.07*s1*s5*sin(q2 + q3) + 0.07*s1*c4*c5*cos(q2 + q3) + 0.07*s4*c1*c5", "0"]
    - ["0", "-0.4*s2 - 0.07*s5*c4*cos(q2 + q3) - 0.07*sin(q2 + q3)*c5 - 0.45*sin(q2 + q3)", "-0.07*s5*c4*cos(q2 + q3) - 0.07*sin(q2 + q3)*c5 - 0.45*sin(q2 + q3)", "0.07*s4*s5*sin(q2 + q3)", "-0.07*s5*cos(q2 + q3) - 0.07*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
