name: ABB IRB 6640-185/2.8
# Kinematically identical DH to robots/abb_irb_6600_175_2_8.yaml
dh:
  a:     [0.32, 1.075, 0.2, 0.0, 0.0, 0.0]
  d:     [0.78, 0.0, 0.0, 1.392, 0.0, 0.2]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -170.0,   170.0]
  J2: [  -65.0,    85.0]
  J3: [ -180.0,    70.0]
  J4: [ -300.0,   300.0]
  J5: [ -120.0,   120.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-1.075*s1*s2 + 0.2*s1*s5*sin(q2 + q3)*c4 - 0.2*s1*sin(q2 + q3) - 0.2*s1*c5*cos(q2 + q3) - 1.392*s1*cos(q2 + q3) - 0.32*s1 - 0.2*s4*s5*c1", "-0.2*s5*c1*c4*cos(q2 + q3) - 0.2*sin(q2 + q3)*c1*c5 - 1.392*sin(q2 + q3)*c1 + 1.075*c1*c2 + 0.2*c1*cos(q2 + q3)", "-0.2*s5*c1*c4*cos(q2 + q3) - 0.2*sin(q2 + q3)*c1*c5 - 1.392*sin(q2 + q3)*c1 + 0.2*c1*cos(q2 + q3)", "-0.2*s1*s5*c4 + 0.2*s4*s5*sin(q2 + q3)*c1", "-0.2*s1*s4*c5 - 0.2*s5*c1*cos(q2 + q3) - 0.2*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.2*s1*s4*s5 + 1.075*s2*c1 - 0.2*s5*sin(q2 + q3)*c1*c4 + 0.2*sin(q2 + q3)*c1 + 0.2*c1*c5*cos(q2 + q3) + 1.392*c1*cos(q2 + q3) + 0.32*c1", "-0.2*s1*s5*c4*cos(q2 + q3) - 0.2*s1*sin(q2 + q3)*c5 - 1.392*s1*sin(q2 + q3) + 1.075*s1*c2 + 0.2*s1*cos(q2 + q3)", "-0.2*s1*s5*c4*cos(q2 + q3) - 0.2*s1*sin(q2 + q3)*c5 - 1.392*s1*sin(q2 + q3) + 0.2*s1*cos(q2 + q3)", "0.2*s1*s4*s5*sin(q2 + q3) + 0.2*s5*c1*c4", "-0.2*s1*s5*cos(q2 + q3) - 0.2*s1*sin(q2 + q3)*c4*c5 + 0.2*s4*c1*c5", "0"]
    - ["0", "-1.075*s2 + 0.2*s5*sin(q2 + q3)*c4 - 0.2*sin(q2 + q3) - 0.2*c5*cos(q2 + q3) - 1.392*cos(q2 + q3)", "0.2*s5*sin(q2 + q3)*c4 - 0.2*sin(q2 + q3) - 0.2*c5*cos(q2 + q3) - 1.392*cos(q2 + q3)", "0.2*s4*s5*cos(q2 + q3)", "0.2*s5*sin(q2 + q3) - 0.2*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
