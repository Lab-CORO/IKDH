  d:     [0.575, 0.0, 0.0, 1.035, 0.0, 0.185]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, 0, -pi/2, 0, 0, pi]
limits:
  J1: [ -185.0,   185.0]
  J2: [ -175.0,    60.0]
  J3: [ -120.0,   165.0]
  J4: [ -180.0,   180.0]
  J5: [ -125.0,   125.0]
  J6: [ -350.0,   350.0]

jacobian:
