name: Mitsubishi RV-2FR
# Kinematically identical DH to robots/mitsubishi_rv_2f.yaml
dh:
  a:     [0.0, 0.23, 0.05, 0.0, 0.0, 0.0]
  d:     [0.295, 0.0, 0.0, 0.27, 0.0, 0.07]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -240.0,   240.0]
  J2: [ -120.0,   120.0]
  J3: [    0.0,   160.0]
  J4: [ -200.0,   200.0]
  J5: [ -120.0,   120.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.23*s1*s2 - 0.07*s1*s5*c4*cos(q2 + q3) - 0.07*s1*sin(q2 + q3)*c5 - 0.27*s1*sin(q2 + q3) + 0.05*s1*cos(q2 + q3) - 0.07*s4*s5*c1", "-0.07*s5*sin(q2 + q3)*c1*c4 + 0.05*sin(q2 + q3)*c1 + 0.23*c1*c2 + 0.07*c1*c5*cos(q2 + q3) + 0.27*c1*cos(q2 + q3)", "-0.07*s5*sin(q2 + q3)*c1*c4 + 0.05*sin(q2 + q3)*c1 + 0.07*c1*c5*cos(q2 + q3) + 0.27*c1*cos(q2 + q3)", "-0.07*s1*s5*c4 - 0.07*s4*s5*c1*cos(q2 + q3)", "-0.07*s1*s4*c5 - 0.07*s5*sin(q2 + q3)*c1 + 0.07*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.07*s1*s4*s5 + 0.23*s2*c1 + 0.07*s5*c1*c4*cos(q2 + q3) + 0.07*sin(q2 + q3)*c1*c5 + 0.27*sin(q2 + q3)*c1 - 0.05*c1*cos(q2 + q3)", "-0.07*s1*s5*sin(q2 + q3)*c4 + 0.05*s1*sin(q2 + q3) + 0.23*s1*c2 + 0.07*s1*c5*cos(q2 + q3) + 0.27*s1*cos(q2 + q3)", "-0.07*s1*s5*sin(q2 + q3)*c4 + 0.05*s1*sin(q2 + q3) + 0.07*s1*c5*cos(q2 + q3) + 0.27*s1*cos(q2 + q3)", "-0.07*s1*s4*s5*cos(q2 + q3) + 0.07*s5*c1*c4", "-0.07*s1*s5*sin(q2 + q3) + 0.07*s1*c4*c5*cos(q2 + q3) + 0.07*s4*c1*c5", "0"]
    - ["0", "-0.23*s2 - 0.07*s5*c4*cos(q2 + q3) - 0.07*sin(q2 + q3)*c5 - 0.27*sin(q2 + q3) + 0.05*cos(q2 + q3)", "-0.07*s5*c4*cos(q2 + q3) - 0.07*sin(q2 + q3)*c5 - 0.27*sin(q2 + q3) + 0.05*cos(q2 + q3)", "0.07*s4*s5*sin(q2 + q3)", "-0.07*s5*cos(q2 + q3) - 0.07*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
