name: ABB IRB 2600-20/1.65
# Kinematically identical DH to robots/abb_irb_2600_12_1_65.yaml
dh:
  a:     [0.15, 0.7, 0.115, 0.0, 0.0, 0.0]
  d:     [0.445, 0.0, 0.0, 0.795, 0.0, 0.085]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -180.0,   180.0]
  J2: [  -95.0,   155.0]
  J3: [ -180.0,    75.0]
  J4: [ -400.0,   400.0]
  J5: [ -120.0,   120.0]
  J6: [ -400.0,   400.0]

jacobian:
  rows:
    - ["-0.7*s1*s2 + 0.085*s1*s5*sin(q2 + q3)*c4 - 0.115*s1*sin(q2 + q3) - 0.085*s1*c5*cos(q2 + q3) - 0.795*s1*cos(q2 + q3) - 0.15*s1 - 0.085*s4*s5*c1", "-0.085*s5*c1*c4*cos(q2 + q3) - 0.085*sin(q2 + q3)*c1*c5 - 0.795*sin(q2 + q3)*c1 + 0.7*c1*c2 + 0.115*c1*cos(q2 + q3)", "-0.085*s5*c1*c4*cos(q2 + q3) - 0.085*sin(q2 + q3)*c1*c5 - 0.795*sin(q2 + q3)*c1 + 0.115*c1*cos(q2 + q3)", "-0.085*s1*s5*c4 + 0.085*s4*s5*sin(q2 + q3)*c1", "-0.085*s1*s4*c5 - 0.085*s5*c1*cos(q2 + q3) - 0.085*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.085*s1*s4*s5 + 0.7*s2*c1 - 0.085*s5*sin(q2 + q3)*c1*c4 + 0.115*sin(q2 + q3)*c1 + 0.085*c1*c5*cos(q2 + q3) + 0.795*c1*cos(q2 + q3) + 0.15*c1", "-0.085*s1*s5*c4*cos(q2 + q3) - 0.085*s1*sin(q2 + q3)*c5 - 0.795*s1*sin(q2 + q3) + 0.7*s1*c2 + 0.115*s1*cos(q2 + q3)", "-0.085*s1*s5*c4*cos(q2 + q3) - 0.085*s1*sin(q2 + q3)*c5 - 0.795*s1*sin(q2 + q3) + 0.115*s1*cos(q2 + q3)", "0.085*s1*s4*s5*sin(q2 + q3) + 0.085*s5*c1*c4", "-0.085*s1*s5*cos(q2 + q3) - 0.085*s1*sin(q2 + q3)*c4*c5 + 0.085*s4*c1*c5", "0"]
    - ["0", "-0.7*s2 + 0.085*s5*sin(q2 + q3)*c4 - 0.115*sin(q2 + q3) - 0.085*c5*cos(q2 + q3) - 0.795*cos(q2 + q3)", "0.085*s5*sin(q2 + q3)*c4 - 0.115*sin(q2 + q3) - 0.085*c5*cos(q2 + q3) - 0.795*cos(q2 + q3)", "0.085*s4*s5*cos(q2 + q3)", "0.085*s5*sin(q2 + q3) - 0.085*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
