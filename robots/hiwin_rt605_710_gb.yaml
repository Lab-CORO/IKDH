name: HIWIN RT605-710-GB
# Kinematically identical DH to robots/hiwin_ra605_710_gb.yaml
dh:
  a:     [0.03, 0.34, 0.04, 0.0, 0.0, 0.0]
  d:     [0.375, 0.0, 0.0, 0.338, 0.0, 0.0865]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -165.0,   165.0]
  J2: [ -125.0,    85.0]
  J3: [  -55.0,   185.0]
  J4: [ -190.0,   190.0]
  J5: [ -115.0,   115.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.34*s1*s2 + 0.0865*s1*s5*sin(q2 + q3)*c4 - 0.04*s1*sin(q2 + q3) - 0.0865*s1*c5*cos(q2 + q3) - 0.338*s1*cos(q2 + q3) - 0.03*s1 - 0.0865*s4*s5*c1", "-0.0865*s5*c1*c4*cos(q2 + q3) - 0.0865*sin(q2 + q3)*c1*c5 - 0.338*sin(q2 + q3)*c1 + 0.34*c1*c2 + 0.04*c1*cos(q2 + q3)", "-0.0865*s5*c1*c4*cos(q2 + q3) - 0.0865*sin(q2 + q3)*c1*c5 - 0.338*sin(q2 + q3)*c1 + 0.04*c1*cos(q2 + q3)", "-0.0865*s1*s5*c4 + 0.0865*s4*s5*sin(q2 + q3)*c1", "-0.0865*s1*s4*c5 - 0.0865*s5*c1*cos(q2 + q3) - 0.0865*sin(q2 + q3)*c1*c4*c5", "0"]
    - ["-0.0865*s1*s4*s5 + 0.34*s2*c1 - 0.0865*s5*sin(q2 + q3)*c1*c4 + 0.04*sin(q2 + q3)*c1 + 0.0865*c1*c5*cos(q2 + q3) + 0.338*c1*cos(q2 + q3) + 0.03*c1", "-0.0865*s1*s5*c4*cos(q2 + q3) - 0.0865*s1*sin(q2 + q3)*c5 - 0.338*s1*sin(q2 + q3) + 0.34*s1*c2 + 0.04*s1*cos(q2 + q3)", "-0.0865*s1*s5*c4*cos(q2 + q3) - 0.0865*s1*sin(q2 + q3)*c5 - 0.338*s1*sin(q2 + q3) + 0.04*s1*cos(q2 + q3)", "0.0865*s1*s4*s5*sin(q2 + q3) + 0.0865*s5*c1*c4", "-0.0865*s1*s5*cos(q2 + q3) - 0.0865*s1*sin(q2 + q3)*c4*c5 + 0.0865*s4*c1*c5", "0"]
    - ["0", "-0.34*s2 + 0.0865*s5*sin(q2 + q3)*c4 - 0.04*sin(q2 + q3) - 0.0865*c5*cos(q2 + q3) - 0.338*cos(q2 + q3)", "0.0865*s5*sin(q2 + q3)*c4 - 0.04*sin(q2 + q3) - 0.0865*c5*cos(q2 + q3) - 0.338*cos(q2 + q3)", "0.0865*s4*s5*cos(q2 + q3)", "0.0865*s5*sin(q2 + q3) - 0.0865*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
