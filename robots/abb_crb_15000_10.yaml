name: ABB CRB 15000 10
# Kinematically identical DH to robots/crb15000_10.yaml
dh:
  a:     [0.15, 0.707, 0.11, 0.0, 0.08, 0.0]
  d:     [0.4, 0.0, 0.0, 0.637, 0.0, 0.101]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, 0, 0, 0, pi]
limits:
  J1: [ -270.0,   270.0]
  J2: [ -180.0,   180.0]
  J3: [ -225.0,    85.0]
  J4: [ -180.0,   180.0]
  J5: [ -180.0,   180.0]
  J6: [ -270.0,   270.0]

jacobian:
  rows:
    - ["-0.707*s1*s2 + 0.101*s1*s5*sin(q2 + q3)*c4 - 0.08*s1*s5*cos(q2 + q3) - 0.08*s1*sin(q2 + q3)*c4*c5 - 0.11*s1*sin(q2 + q3) - 0.101*s1*c5*cos(q2 + q3) - 0.637*s1*cos(q2 + q3) - 0.15*s1 - 0.101*s4*s5*c1 + 0.08*s4*c1*c5", "-0.08*s5*sin(q2 + q3)*c1 - 0.101*s5*c1*c4*cos(q2 + q3) - 0.101*sin(q2 + q3)*c1*c5 - 0.637*sin(q2 + q3)*c1 + 0.707*c1*c2 + 0.08*c1*c4*c5*cos(q2 + q3) + 0.11*c1*cos(q2 + q3)", "-0.08*s5*sin(q2 + q3)*c1 - 0.101*s5*c1*c4*cos(q2 + q3) - 0.101*sin(q2 + q3)*c1*c5 - 0.637*sin(q2 + q3)*c1 + 0.08*c1*c4*c5*cos(q2 + q3) + 0.11*c1*cos(q2 + q3)", "-0.101*s1*s5*c4 + 0.08*s1*c4*c5 + 0.101*s4*s5*sin(q2 + q3)*c1 - 0.08*s4*sin(q2 + q3)*c1*c5", "-0.08*s1*s4*s5 - 0.101*s1*s4*c5 - 0.08*s5*sin(q2 + q3)*c1*c4 - 0.101*s5*c1*cos(q2 + q3) - 0.101*sin(q2 + q3)*c1*c4*c5 + 0.08*c1*c5*cos(q2 + q3)", "0"]
    - ["-0.101*s1*s4*s5 + 0.08*s1*s4*c5 + 0.707*s2*c1 - 0.101*s5*sin(q2 + q3)*c1*c4 + 0.08*s5*c1*cos(q2 + q3) + 0.08*sin(q2 + q3)*c1*c4*c5 + 0.11*sin(q2 + q3)*c1 + 0.101*c1*c5*cos(q2 + q3) + 0.637*c1*cos(q2 + q3) + 0.15*c1", "-0.08*s1*s5*sin(q2 + q3) - 0.101*s1*s5*c4*cos(q2 + q3) - 0.101*s1*sin(q2 + q3)*c5 - 0.637*s1*sin(q2 + q3) + 0.707*s1*c2 + 0.08*s1*c4*c5*cos(q2 + q3) + 0.11*s1*cos(q2 + q3)", "-0.08*s1*s5*sin(q2 + q3) - 0.101*s1*s5*c4*cos(q2 + q3) - 0.101*s1*sin(q2 + q3)*c5 - 0.637*s1*sin(q2 + q3) + 0.08*s1*c4*c5*cos(q2 + q3) + 0.11*s1*cos(q2 + q3)", "0.101*s1*s4*s5*sin(q2 + q3) - 0.08*s1*s4*sin(q2 + q3)*c5 + 0.101*s5*c1*c4 - 0.08*c1*c4*c5", "-0.08*s1*s5*sin(q2 + q3)*c4 - 0.101*s1*s5*cos(q2 + q3) - 0.101*s1*sin(q2 + q3)*c4*c5 + 0.08*s1*c5*cos(q2 + q3) + 0.08*s4*s5*c1 + 0.101*s4*c1*c5", "0"]
    - ["0", "-0.707*s2 + 0.101*s5*sin(q2 + q3)*c4 - 0.08*s5*cos(q2 + q3) - 0.08*sin(q2 + q3)*c4*c5 - 0.11*sin(q2 + q3) - 0.101*c5*cos(q2 + q3) - 0.637*cos(q2 + q3)", "0.101*s5*sin(q2 + q3)*c4 - 0.08*s5*cos(q2 + q3) - 0.08*sin(q2 + q3)*c4*c5 - 0.11*sin(q2 + q3) - 0.101*c5*cos(q2 + q3) - 0.637*cos(q2 + q3)", "0.101*s4*s5*cos(q2 + q3) - 0.08*s4*c5*cos(q2 + q3)", "0.101*s5*sin(q2 + q3) - 0.08*s5*c4*cos(q2 + q3) - 0.08*sin(q2 + q3)*c5 - 0.101*c4*c5*cos(q2 + q3)", "0"]
    - ["0", "-s1", "-s1", "c1*cos(q2 + q3)", "-s1*c4 + s4*sin(q2 + q3)*c1", "-s1*s4*s5 - s5*sin(q2 + q3)*c1*c4 + c1*c5*cos(q2 + q3)"]
    - ["0", "c1", "c1", "s1*cos(q2 + q3)", "s1*s4*sin(q2 + q3) + c1*c4", "-s1*s5*sin(q2 + q3)*c4 + s1*c5*cos(q2 + q3) + s4*s5*c1"]
    - ["1", "0", "0", "-sin(q2 + q3)", "s4*cos(q2 + q3)", "-s5*c4*cos(q2 + q3) - sin(q2 + q3)*c5"]
