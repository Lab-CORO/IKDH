name: Mitsubishi RV-12CRL-D
# Kinematically identical DH to robots/mitsubishi_rv_12crl.yaml
dh:
  a:     [0.13, 0.6, 0.15, 0.0, 0.0, 0.0]
  d:     [0.45, 0.0, 0.0, 0.76, 0.0, 0.1]
  alpha: [-pi/2, 0, -pi/2, pi/2, -pi/2, 0]
  theta: [0, -pi/2, -pi/2, 0, 0, pi]
limits:
  J1: [ -170.0,   170.0]
  J2: [  -90.0,   150.0]
  J3: [   -0.0,   170.0]
  J4: [ -190.0,   190.0]
  J5: [ -120.0,   120.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.6*s1*s2 - 0.1*s1*s5*c4*cos(q2 + q3) - 0.1*s1*sin(q2 + q3)*c5 - 0.76*s1*sin(q2 + q3) + 0.15*s1*cos(q2 + q3) - 0.13*s1 - 0.1*s4*s5*c1", "-0.1*s5*sin(q2 + q3)*c1*c4 + 0.15*sin(q2 + q3)*c1 + 0.6*c1*c2 + 0.1*c1*c5*cos(q2 + q3) + 0.76*c1*cos(q2 + q3)", "-0.1*s5*sin(q2 + q3)*c1*c4 + 0.15*sin(q2 + q3)*c1 + 0.1*c1*c5*cos(q2 + q3) + 0.76*c1*cos(q2 + q3)", "-0.1*s1*s5*c4 - 0.1*s4*s5*c1*cos(q2 + q3)", "-0.1*s1*s4*c5 - 0.1*s5*sin(q2 + q3)*c1 + 0.1*c1*c4*c5*cos(q2 + q3)", "0"]
    - ["-0.1*s1*s4*s5 + 0.6*s2*c1 + 0.1*s5*c1*c4*cos(q2 + q3) + 0.1*sin(q2 + q3)*c1*c5 + 0.76*sin(q2 + q3)*c1 - 0.15*c1*cos(q2 + q3) + 0.13*c1", "-0.1*s1*s5*sin(q2 + q3)*c4 + 0.15*s1*sin(q2 + q3) + 0.6*s1*c2 + 0.1*s1*c5*cos(q2 + q3) + 0.76*s1*cos(q2 + q3)", "-0.1*s1*s5*sin(q2 + q3)*c4 + 0.15*s1*sin(q2 + q3) + 0.1*s1*c5*cos(q2 + q3) + 0.76*s1*cos(q2 + q3)", "-0.1*s1*s4*s5*cos(q2 + q3) + 0.1*s5*c1*c4", "-0.1*s1*s5*sin(q2 + q3) + 0.1*s1*c4*c5*cos(q2 + q3) + 0.1*s4*c1*c5", "0"]
    - ["0", "-0.6*s2 - 0.1*s5*c4*cos(q2 + q3) - 0.1*sin(q2 + q3)*c5 - 0.76*sin(q2 + q3) + 0.15*cos(q2 + q3)", "-0.1*s5*c4*cos(q2 + q3) - 0.1*sin(q2 + q3)*c5 - 0.76*sin(q2 + q3) + 0.15*cos(q2 + q3)", "0.1*s4*s5*sin(q2 + q3)", "-0.1*s5*cos(q2 + q3) - 0.1*sin(q2 + q3)*c4*c5", "0"]
    - ["0", "-s1", "-s1", "sin(q2 + q3)*c1", "-s1*c4 - s4*c1*cos(q2 + q3)", "-s1*s4*s5 + s5*c1*c4*cos(q2 + q3) + sin(q2 + q3)*c1*c5"]
    - ["0", "c1", "c1", "s1*sin(q2 + q3)", "-s1*s4*cos(q2 + q3) + c1*c4", "s1*s5*c4*cos(q2 + q3) + s1*sin(q2 + q3)*c5 + s4*s5*c1"]
    - ["1", "0", "0", "cos(q2 + q3)", "s4*sin(q2 + q3)", "-s5*sin(q2 + q3)*c4 + c5*cos(q2 + q3)"]
