name: Siasun GCR10-1300
# Kinematically identical DH to robots/duco_gcr10_1300.yaml
dh:
  a:     [0.0, 0.608, 0.566, 0.0, 0.0, 0.0]
  d:     [0.165, 0.0, 0.0, 0.164, 0.126, 0.113]
  alpha: [pi/2, 0, 0, -pi/2, pi/2, 0]
  theta: [pi, pi/2, 0, -pi/2, 0, 0]
limits:
  J1: [ -360.0,   360.0]
  J2: [ -360.0,   360.0]
  J3: [ -360.0,   360.0]
  J4: [ -360.0,   360.0]
  J5: [ -360.0,   360.0]
  J6: [ -360.0,   360.0]

jacobian:
  rows:
    - ["-0.608*s1*s2 + 0.113*s1*s5*cos(q2 + q3 + q4) - 0.566*s1*sin(q2 + q3) - 0.126*s1*sin(q2 + q3 + q4) - 0.113*c1*c5 - 0.164*c1", "0.113*s5*sin(q2 + q3 + q4)*c1 + 0.608*c1*c2 + 0.566*c1*cos(q2 + q3) + 0.126*c1*cos(q2 + q3 + q4)", "0.113*s5*sin(q2 + q3 + q4)*c1 + 0.566*c1*cos(q2 + q3) + 0.126*c1*cos(q2 + q3 + q4)", "0.113*s5*sin(q2 + q3 + q4)*c1 + 0.126*c1*cos(q2 + q3 + q4)", "0.113*s1*s5 - 0.113*c1*c5*cos(q2 + q3 + q4)", "0"]
    - ["-0.113*s1*c5 - 0.164*s1 + 0.608*s2*c1 - 0.113*s5*c1*cos(q2 + q3 + q4) + 0.566*sin(q2 + q3)*c1 + 0.126*sin(q2 + q3 + q4)*c1", "0.113*s1*s5*sin(q2 + q3 + q4) + 0.608*s1*c2 + 0.566*s1*cos(q2 + q3) + 0.126*s1*cos(q2 + q3 + q4)", "0.113*s1*s5*sin(q2 + q3 + q4) + 0.566*s1*cos(q2 + q3) + 0.126*s1*cos(q2 + q3 + q4)", "0.113*s1*s5*sin(q2 + q3 + q4) + 0.126*s1*cos(q2 + q3 + q4)", "-0.113*s1*c5*cos(q2 + q3 + q4) - 0.113*s5*c1", "0"]
    - ["0", "-0.608*s2 + 0.113*s5*cos(q2 + q3 + q4) - 0.566*sin(q2 + q3) - 0.126*sin(q2 + q3 + q4)", "0.113*s5*cos(q2 + q3 + q4) - 0.566*sin(q2 + q3) - 0.126*sin(q2 + q3 + q4)", "0.113*s5*cos(q2 + q3 + q4) - 0.126*sin(q2 + q3 + q4)", "0.113*sin(q2 + q3 + q4)*c5", "0"]
    - ["0", "-s1", "-s1", "-s1", "sin(q2 + q3 + q4)*c1", "-s1*c5 - s5*c1*cos(q2 + q3 + q4)"]
    - ["0", "c1", "c1", "c1", "s1*sin(q2 + q3 + q4)", "-s1*s5*cos(q2 + q3 + q4) + c1*c5"]
    - ["1", "0", "0", "0", "cos(q2 + q3 + q4)", "s5*sin(q2 + q3 + q4)"]
